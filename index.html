<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Donuts</title>

    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #fff0f5;
            text-align: center;
            margin: 0;
            padding: 0;
        }

        header {
            background-color: #ff69b4;
            color: white;
            padding: 20px;
            font-size: 32px;
            font-weight: bold;
        }

        .cardapio {
            margin: 40px auto;
            width: 300px;
            background-color: white;
            border-radius: 15px;
            padding: 20px;
            box-shadow: 0px 4px 10px rgba(0,0,0,0.2);
        }

        .item {
            display: flex;
            justify-content: space-between;
            margin: 15px 0;
            font-size: 20px;
        }

        .item:hover {
            color: #ff1493;
            transform: scale(1.05);
            transition: 0.3s;
        }

        .donuts-img {
            margin-top: 20px;
            width: 100px; /* ajusta o tamanho das imagens */
            height: auto;
            margin-right: 10px;
        }

        .donuts-container {
            margin-top: 20px;
        }
    </style>
</head>
<body>

    <header>
        🍩 Donuts
    </header>

    <div class="cardapio">
        <h2>Sabores e Preços</h2>

        <div class="item">
            <span>Chocolate</span>
            <span>R$ 8,00</span>
        </div>

        <div class="item">
            <span>Morango</span>
            <span>R$ 7,50</span>
        </div>

        <div class="item">
            <span>Baunilha</span>
            <span>R$ 7,00</span>
        </div>

        <div class="item">
            <span>Doce de Leite</span>
            <span>R$ 9,00</span>
        </div>

        <div class="item">
            <span>Nutella</span>
            <span>R$ 10,00</span>
        </div>

        <!-- Container para imagens -->
        <div class="donuts-container">
            <img src="https://kitchen335co.com/chocolate-glazed-baked-vanilla-donuts/" alt="Donut 1" class="donuts-img">
            <img src= "https://www.amandocozinhar.com/2015/07/donuts-assados-de-morango.html" alt="Donut 2" class="donuts-img">
        </div>

    </div>

</body>
</html>
